<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 280px;
            background: transparent;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* Premium Glass Effect */
        .premium-window {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            padding: 16px 16px 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brand-icon {
            font-size: 20px;
            filter: drop-shadow(0 4px 10px rgba(0, 122, 255, 0.4));
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
            letter-spacing: -0.2px;
        }

        .chip {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 9px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 14px 14px 10px 14px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 11px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.6);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .value {
            font-size: 12px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
            background: rgba(255, 255, 255, 0.25);
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #34c759;
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.5); }
            70% { box-shadow: 0 0 0 6px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }

        .status-text {
            font-size: 12px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.9);
        }

        .action-button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 12px 16px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(0, 0, 0, 0.9);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 14px;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .action-button:active {
            transform: translateY(1px);
        }

        .btn-icon {
            font-size: 16px;
        }

        .results-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .results-title {
            font-size: 10px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .results-badge {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .message {
            text-align: center;
            padding: 10px 0;
            color: rgba(0, 0, 0, 0.6);
            font-size: 11px;
            font-weight: 500;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            color: rgba(0, 0, 0, 0.6);
            font-weight: 500;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .divider {
            width: 2px;
            height: 2px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
        }

        .footer-right {
            color: rgba(0, 122, 255, 0.9);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="premium-window">
        <div class="header">
            <div class="brand">
                <span class="brand-icon">🛡️</span>
                <span class="brand-name">DeepGuard</span>
            </div>
            <span class="chip">v1.0</span>
        </div>

        <div class="content">
            <div class="glass-panel">
                <div class="row">
                    <span class="label">Status</span>
                    <div class="status-container">
                        <span class="live-dot"></span>
                        <span class="status-text" id="statusText">Active</span>
                    </div>
                </div>
                <div class="row">
                    <span class="label">Mode</span>
                    <span class="value">AI Detection</span>
                </div>
            </div>

            <button class="action-button" id="scanBtn">
                <span class="btn-icon">🔍</span>
                Analyze Page
            </button>

            <div class="results-panel">
                <div class="results-header">
                    <span class="results-title">Results</span>
                    <span class="results-badge" id="imageCount">0</span>
                </div>
                <div id="resultsList" class="message">
                    RESULT WILL APPEAR HERE 
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-left">
                <span>Private</span>
                <span class="divider"></span>
                <span>Local</span>
            </div>
            <div class="footer-right" id="footerStatus">
                Ready
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
